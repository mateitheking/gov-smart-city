<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Регистрация — Aqyldy Qala</title>

  <!-- Support widget (если вы его подключали) -->
  <link rel="stylesheet" href="support-widget.css" />

  <script defer src="app.js"></script>
  <script defer src="support-widget.js"></script>

  <style>
    :root {
      --accent: #FFC000;

      --bg1: #f6f6f6;
      --bg2: #ffffff;

      --card: rgba(255,255,255,0.94);
      --text: #111111;
      --muted: rgba(0,0,0,0.62);
      --line: rgba(0,0,0,0.14);

      --input-bg: rgba(255,255,255,0.92);

      --shadow: 0 16px 46px rgba(0,0,0,0.16);
    }

    * { box-sizing: border-box; }
    html, body { height: 100%; margin: 0; font-family: Inter, "Segoe UI", Arial, sans-serif; }

    body {
      display: grid;
      place-items: center;
      padding: 24px;
      color: var(--text);
      background:
        radial-gradient(circle at 20% 0%, rgba(255,192,0,0.08), transparent 42%),
        radial-gradient(circle at 80% 10%, rgba(255,192,0,0.05), transparent 45%),
        radial-gradient(circle at top, rgba(0,0,0,0.06), transparent 42%),
        linear-gradient(180deg, var(--bg1) 0%, var(--bg2) 55%, #f1f1f1 100%);
    }

    .card {
      width: 100%;
      max-width: 460px;
      background: var(--card);
      border: 1px solid rgba(0,0,0,0.10);
      border-radius: 18px;
      box-shadow: var(--shadow);
      padding: 36px 32px 28px;
      backdrop-filter: blur(10px);
    }

    .top {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      flex-wrap: wrap;
      margin-bottom: 14px;
    }

    .top a {
      color: var(--muted);
      text-decoration: none;
      font-size: 13px;
      font-weight: 800;
    }

    .top a:hover { color: var(--text); }

    .title {
      margin: 0 0 10px;
      font-size: 28px;
      letter-spacing: .4px;
      text-transform: uppercase;
      font-weight: 1000;
    }

    .sub {
      margin: 0 0 22px;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.5;
      font-weight: 700;
    }

    .field { margin-bottom: 16px; }

    .field label {
      display: block;
      margin-bottom: 8px;
      color: var(--muted);
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: .6px;
      font-weight: 900;
    }

    .field input {
      width: 100%;
      height: 48px;
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 0 14px;
      background: var(--input-bg);
      color: var(--text);
      font-weight: 800;
      outline: none;
    }

    .field input:focus {
      border-color: rgba(0,0,0,0.28);
      box-shadow: 0 0 0 4px rgba(255,192,0,0.14);
    }

    .actions {
      display: grid;
      gap: 10px;
      margin-top: 8px;
    }

    .main-btn, .secondary-btn {
      height: 46px;
      border-radius: 999px;
      display: grid;
      place-items: center;
      text-decoration: none;
      font-weight: 900;
      letter-spacing: .2px;
      cursor: pointer;
      border: 1px solid rgba(0,0,0,0.14);
      transition: transform .08s ease, filter .2s ease, background .2s ease;
    }

    /* Accent yellow */
    .main-btn {
      background: var(--accent);
      color: #111;
      border-color: rgba(0,0,0,0.18);
    }

    .main-btn:hover { filter: brightness(1.03); }
    .main-btn:active { transform: translateY(1px); }

    .secondary-btn {
      background: rgba(255,255,255,0.92);
      color: rgba(0,0,0,0.72);
    }

    .secondary-btn:hover { background: rgba(0,0,0,0.04); }
    .secondary-btn:active { transform: translateY(1px); }
  </style>
</head>

<body>
  <div class="card">
    <div class="top">
      <a href="index.html">← На главную</a>
      <a href="login.html">Уже есть аккаунт? Вход</a>
    </div>

    <h1 class="title">Регистрация</h1>
    <p class="sub">Создайте аккаунт, после этого вы будете автоматически авторизованы.</p>

    <form id="registerForm" novalidate>
      <div class="field">
        <label for="registerUsername">Имя пользователя</label>
        <input id="registerUsername" type="text" autocomplete="username" required />
      </div>

      <div class="field">
        <label for="registerEmail">Электронная почта</label>
        <input id="registerEmail" type="email" autocomplete="email" required />
      </div>

      <div class="field">
        <label for="registerPassword">Пароль</label>
        <input id="registerPassword" type="password" autocomplete="new-password" required />
      </div>

      <div class="field">
        <label for="registerPasswordConfirm">Повторите пароль</label>
        <input id="registerPasswordConfirm" type="password" autocomplete="new-password" required />
      </div>

      <div class="actions">
        <button type="submit" class="main-btn">Создать аккаунт</button>
        <a href="index.html" class="secondary-btn">На главную</a>
      </div>
    </form>
  </div>
</body>
</html>
