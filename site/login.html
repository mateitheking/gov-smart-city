<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Вход — Aqyldy Qala</title>
  <script defer src="app.js"></script>
  <style>
    :root {
      --bg: #ececec;
      --card: rgba(255,255,255,.94);
      --text: #0d8fcb;
      --muted: #8b8b8b;
      --line: #e6e6e6;
      --input-bg: #fbfbfb;
      --btn: #16c6fb;
      --btn-hover: #025e8b;
      --shadow: 0 16px 40px rgba(0,0,0,.08);
    }
    * { box-sizing: border-box; }
    html, body { height: 100%; margin: 0; font-family: Inter, "Segoe UI", Arial, sans-serif; }
    body {
      display: grid;
      place-items: center;
      padding: 24px;
      background: radial-gradient(circle at top, rgba(255,255,255,.45), transparent 35%), linear-gradient(180deg, #ededed 0%, #e4e4e4 100%);
      color: var(--text);
    }
    .card {
      width: 100%; max-width: 460px; background: var(--card); border: 1px solid rgba(255,255,255,.65);
      border-radius: 18px; box-shadow: var(--shadow); padding: 36px 32px 28px;
    }
    .top { display: flex; justify-content: space-between; gap: 12px; flex-wrap: wrap; margin-bottom: 14px; }
    .top a { color: var(--muted); text-decoration: none; font-size: 13px; }
    .top a:hover { color: var(--text); }
    .title { margin: 0 0 10px; font-size: 28px; text-transform: uppercase; }
    .sub { margin: 0 0 22px; color: var(--muted); font-size: 13px; line-height: 1.5; }
    .field { margin-bottom: 16px; }
    .field label { display: block; margin-bottom: 8px; color: var(--muted); font-size: 11px; text-transform: uppercase; letter-spacing: .5px; }
    .field input { width: 100%; height: 48px; border: 1px solid var(--line); border-radius: 10px; padding: 0 14px; background: var(--input-bg); }
    .passwordWrap { position: relative; }
    .passwordWrap input { padding-right: 46px; }
    .toggleBtn { position: absolute; right: 10px; top: 50%; transform: translateY(-50%); border: none; background: transparent; cursor: pointer; }
    .actions { display: grid; gap: 10px; margin-top: 8px; }
    .main-btn,.secondary-btn { height: 46px; border-radius: 999px; display: grid; place-items: center; text-decoration: none; font-weight: 600; }
    .main-btn { border: none; background: var(--btn); color: #fff; cursor: pointer; }
    .main-btn:hover { background: var(--btn-hover); }
    .secondary-btn { border: 1px solid #dcdcdc; color: #555; background: #fff; }
  </style>
</head>
<body>
  <div class="card">
    <div class="top">
      <a href="index.html">← На главную</a>
      <a href="register.html">Нет аккаунта? Регистрация</a>
    </div>

    <h1 class="title">Вход</h1>
    <p class="sub">Войдите в аккаунт, чтобы отправлять обращения от своего имени.</p>

    <form id="loginForm" novalidate>
      <div class="field">
        <label for="username">Логин или email</label>
        <input id="username" type="text" autocomplete="username" required />
      </div>

      <div class="field">
        <label for="password">Пароль</label>
        <div class="passwordWrap">
          <input id="password" type="password" autocomplete="current-password" required />
          <button id="togglePassword" class="toggleBtn" type="button" aria-label="Показать/скрыть пароль">👁</button>
        </div>
      </div>

      <div class="actions">
        <button type="submit" class="main-btn">Войти</button>
        <a href="index.html" class="secondary-btn">На главную</a>
      </div>
    </form>
  </div>
</body>
</html>
